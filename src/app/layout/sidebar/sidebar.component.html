<aside class="sidebar" [class.closed]="!isOpen">
  <div class="sidebar-header">
    <a class="logo" routerLink="/dashboard">
      <div class="logo-mark">
        <span class="logo-coin">💰</span>
      </div>
      <div class="logo-text" *ngIf="isOpen">
        <span class="logo-name">CAISSE<span>+</span></span>
        <span class="logo-tagline">Gestion financière</span>
      </div>
    </a>
  </div>

  <div class="sidebar-nav">
    <div class="nav-section" *ngFor="let section of navSections">
      <div class="nav-section-label" *ngIf="isOpen && section.label">
        {{ section.label }}
      </div>
      <a
        *ngFor="let item of section.items"
        [routerLink]="item.route"
        class="nav-item"
        [class.active]="isActive(item.route)"
        [title]="!isOpen ? item.label : ''"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="isOpen">{{ item.label }}</span>
        <span class="nav-badge" *ngIf="isOpen && item.badge">{{
          item.badge
        }}</span>
      </a>
    </div>
  </div>

  <div class="sidebar-footer">
    <div
      class="user-card"
      *ngIf="auth.currentUser$ | async as user"
      (click)="toggleUserOptions()"
    >
      <div class="user-avatar" [style.background]="getUserColor(user)">
        {{ getUserInitial(user) }}
      </div>
      <div class="user-info" *ngIf="isOpen">
        <span class="user-name"> {{ getUserDisplayName(user) }} </span>
        <span class="user-role">{{ getRoleLabel(user.role) }}</span>
      </div>
      <div class="user-status" *ngIf="isOpen">
        <span class="status-dot online"></span>
      </div>
    </div>

    <button
      class="logout-btn"
      (click)="onLogout()"
      [title]="!isOpen ? 'Déconnexion' : ''"
    >
      <span class="logout-icon">🚪</span>
      <span *ngIf="isOpen">Déconnexion</span>
    </button>
  </div>

  <!-- Version mini du footer quand sidebar fermée -->
  <div class="sidebar-footer-mini" *ngIf="!isOpen">
    <button class="logout-btn-mini" (click)="onLogout()" title="Déconnexion">
      <span class="logout-icon">🚪</span>
    </button>
  </div>
</aside>
