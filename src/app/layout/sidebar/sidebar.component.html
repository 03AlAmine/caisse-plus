<aside class="sidebar" [class.sidebar--collapsed]="!isOpen">
  <!-- Logo -->
  <div class="sidebar__header">
    <a class="sidebar__logo" routerLink="/dashboard">
      <div class="sidebar__logo-mark">
        <img src="assets/logo.png" alt="Caisse+" />
      </div>
      <div class="sidebar__logo-text" *ngIf="isOpen">
        <span class="sidebar__logo-name">CAISSE<span>+</span></span>
        <span class="sidebar__logo-sub">Gestion financière</span>
      </div>
    </a>
  </div>

  <!-- Navigation -->
  <!-- Navigation -->
  <nav class="sidebar__nav">
    <div class="nav-section" *ngFor="let section of visibleSections">
      <p class="nav-section__label" *ngIf="isOpen && section.label">
        {{ section.label }}
      </p>
      <a
        *ngFor="let item of section.items"
        [routerLink]="item.route"
        class="nav-item"
        [class.nav-item--active]="isActive(item.route)"
        [title]="!isOpen ? item.label : ''"
      >
        <!-- Icônes SVG par route -->
        <span class="nav-item__icon">
          <ng-container [ngSwitch]="item.route">
            <svg
              *ngSwitchCase="'/dashboard'"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <rect
                x="1"
                y="1"
                width="7"
                height="7"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <rect
                x="10"
                y="1"
                width="7"
                height="7"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <rect
                x="1"
                y="10"
                width="7"
                height="7"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <rect
                x="10"
                y="10"
                width="7"
                height="7"
                rx="1.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
            </svg>
            <svg
              *ngSwitchCase="'/caisses'"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <rect
                x="1.5"
                y="5"
                width="15"
                height="11"
                rx="2"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M6 5V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <circle
                cx="9"
                cy="10.5"
                r="1.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
            </svg>
            <svg
              *ngSwitchCase="'/operations'"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <path
                d="M3 5h12M3 9h8M3 13h5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <svg
              *ngSwitchCase="'/budgets'"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <path
                d="M2 14L6 9l4 3 4-5 2 1"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <rect
                x="2"
                y="2"
                width="14"
                height="14"
                rx="2"
                stroke="currentColor"
                stroke-width="1.5"
              />
            </svg>
            <svg
              *ngSwitchCase="'/rapports'"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <rect
                x="3"
                y="1.5"
                width="12"
                height="15"
                rx="2"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M6 6h6M6 9h6M6 12h4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <svg
              *ngSwitchCase="'/parametres'"
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <circle
                cx="9"
                cy="9"
                r="2.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.42 1.42M13.36 13.36l1.42 1.42M14.78 3.22l-1.42 1.42M4.64 13.36l-1.42 1.42"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <svg
              *ngSwitchDefault
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
            >
              <circle
                cx="9"
                cy="9"
                r="7"
                stroke="currentColor"
                stroke-width="1.5"
              />
            </svg>
          </ng-container>
        </span>
        <span class="nav-item__label" *ngIf="isOpen">{{ item.label }}</span>
        <span class="nav-item__badge" *ngIf="isOpen && item.badge">{{
          item.badge
        }}</span>
      </a>
    </div>
  </nav>
  <!-- Footer utilisateur -->
  <div class="sidebar__footer">
    <div class="user-block" *ngIf="auth.currentUser$ | async as user">
      <div class="user-block__avatar" [style.background]="getUserColor(user)">
        {{ getUserInitial(user) }}
      </div>
      <div class="user-block__info" *ngIf="isOpen">
        <span class="user-block__name">{{ getUserDisplayName(user) }}</span>
        <span class="user-block__role">{{ getRoleLabel(user.role) }}</span>
      </div>
    </div>

    <button
      class="logout-btn"
      (click)="onLogout()"
      [title]="!isOpen ? 'Déconnexion' : ''"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path
          d="M6 14H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h3"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <path
          d="M11 11l3-3-3-3M14 8H6"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span *ngIf="isOpen">Déconnexion</span>
    </button>
  </div>
</aside>
