<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">
  <app-sidebar [isOpen]="sidebarOpen"></app-sidebar>
  <div class="main-content">
    <app-topbar (toggleSidebar)="toggleSidebar()" [isSidebarOpen]="sidebarOpen"></app-topbar>
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Overlay pour mobile -->
<div class="mobile-overlay" *ngIf="sidebarOpen && isMobile" (click)="toggleSidebar()"></div>
