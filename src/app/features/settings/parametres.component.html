<div class="page-wrapper">
  <header class="page-header">
    <div class="page-header__content">
      <h1 class="page-header__title">Paramètres</h1>
      <p class="page-header__subtitle">
        Gérez votre organisation, vos utilisateurs et vos préférences
      </p>
    </div>
  </header>

  <div class="param-layout">
    <nav class="param-nav animate-slide-in">
      <a
        routerLink="utilisateurs"
        routerLinkActive="active"
        class="param-nav__item"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle
            cx="9"
            cy="6"
            r="3"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <path
            d="M3 15c0-3.3 2.7-5 6-5s6 1.7 6 5"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <span class="param-nav__label">Utilisateurs</span>
        <span class="param-nav__badge" *ngIf="pendingInvitations > 0">{{
          pendingInvitations
        }}</span>
      </a>
      <a
        routerLink="categories"
        routerLinkActive="active"
        class="param-nav__item"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path
            d="M3 4h4v4H3V4zM9 4h4v4H9V4zM3 10h4v4H3v-4zM9 10h4v4H9v-4z"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linejoin="round"
          />
        </svg>
        <span class="param-nav__label">Catégories</span>
      </a>
      <a
        routerLink="organisation"
        routerLinkActive="active"
        class="param-nav__item"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect
            x="2"
            y="5"
            width="14"
            height="10"
            rx="1.5"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <path
            d="M6 5V3M12 5V3"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <span class="param-nav__label">Organisation</span>
      </a>
      <a
        routerLink="preferences"
        routerLinkActive="active"
        class="param-nav__item"
        *ngIf="auth.isAdmin()"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle
            cx="9"
            cy="9"
            r="2.5"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <path
            d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.42 1.42M13.36 13.36l1.42 1.42M14.78 3.22l-1.42 1.42M4.64 13.36l-1.42 1.42"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <span class="param-nav__label">Préférences</span>
      </a>
    </nav>

    <div class="param-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
