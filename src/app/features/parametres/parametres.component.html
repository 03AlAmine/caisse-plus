<div class="page-wrapper">

  <app-page-header title="⚙️ Paramètres" subtitle="Gérez votre organisation, vos utilisateurs et vos préférences">
  </app-page-header>

  <div class="param-layout">

    <nav class="param-nav animate-slide-in">
      <a routerLink="utilisateurs" routerLinkActive="active" class="param-nav-item">
        <span class="pni-icon">👥</span>
        <span class="pni-label">Utilisateurs</span>
        <span class="pni-badge" *ngIf="pendingInvitations > 0">{{ pendingInvitations }}</span>
      </a>
      <a routerLink="categories" routerLinkActive="active" class="param-nav-item">
        <span class="pni-icon">🏷️</span>
        <span class="pni-label">Catégories</span>
      </a>
      <a routerLink="organisation" routerLinkActive="active" class="param-nav-item">
        <span class="pni-icon">🏢</span>
        <span class="pni-label">Organisation</span>
      </a>
      <a routerLink="preferences" routerLinkActive="active" class="param-nav-item" *ngIf="auth.isAdmin()">
        <span class="pni-icon">🎨</span>
        <span class="pni-label">Préférences</span>
      </a>
    </nav>

    <div class="param-content">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
